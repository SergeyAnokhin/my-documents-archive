# Serves the built SPA. /api and /thumbnails are routed to the backend by the
# Traefik ingress (not here), so nginx only needs the SPA history fallback.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
