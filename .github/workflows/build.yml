name: build-and-push
on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - .github/workflows/build.yml
concurrency: { group: build-${{ github.ref }}, cancel-in-progress: true }
permissions:
  contents: write       # commit the values.yaml tag bump to the deploy branch
  packages: write       # push images to GHCR
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          echo "registry=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: ${{ github.actor }}, password: ${{ secrets.GITHUB_TOKEN }} }

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.registry }}/backend:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.vars.outputs.registry }}/frontend:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Bump image tags in Helm values
        env: { TAG: ${{ steps.vars.outputs.tag }} }
        run: |
          curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          f=deploy/helm/my-documents-archive/values.yaml
          yq -i ".image.backend.tag = strenv(TAG)"  "$f"
          yq -i ".image.frontend.tag = strenv(TAG)" "$f"

      - name: Commit & push to deploy branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/my-documents-archive/values.yaml
          git diff --cached --quiet || git commit -m "ci: bump image tags to ${{ steps.vars.outputs.tag }} [skip ci]"
          git push origin HEAD:refs/heads/deploy --force
